const { useState, useEffect, useRef } = React;

/* ───────────── Scroll Reveal Hook ───────────── */
function useScrollReveal() {
  useEffect(() => {
    const elements = document.querySelectorAll('.scroll-reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    elements.forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
}

/* ───────────── LOADING BAR ───────────── */
function LoadingBar({ isLoading }) {
  const [progress, setProgress] = useState(0);
  const [show, setShow] = useState(false);

  useEffect(() => {
    let timeoutId;
    let progressInterval;

    if (isLoading) {
      // Delay showing the loader by 300ms (only show if loading takes time)
      timeoutId = setTimeout(() => {
        setShow(true);
        // Animate progress
        progressInterval = setInterval(() => {
          setProgress(prev => {
            if (prev >= 90) return prev;
            return prev + Math.random() * 15;
          });
        }, 100);
      }, 300);
    } else {
      setProgress(100);
      setTimeout(() => {
        setShow(false);
        setProgress(0);
      }, 300);
    }

    return () => {
      clearTimeout(timeoutId);
      clearInterval(progressInterval);
    };
  }, [isLoading]);

  if (!show) return null;

  return (
    <div className="fixed top-0 left-0 right-0 z-[100] h-0.5 bg-athen-border">
      <div 
        className="h-full bg-athen-cream transition-all duration-200 ease-out"
        style={{ 
          width: `${Math.min(progress, 100)}%`,
          boxShadow: '0 0 10px rgba(232, 228, 220, 0.5)'
        }} 
      />
    </div>
  );
}

/* ───────────── APP ───────────── */
function App() {
  useScrollReveal();
  const [isLoading, setIsLoading] = useState(true);
  const [showContent, setShowContent] = useState(false);

  // Simulate initial page load with delay
  useEffect(() => {
    // Start loading
    setIsLoading(true);
    
    // Simulate page load delay (1.5 seconds)
    const loadTimer = setTimeout(() => {
      setIsLoading(false);
      // Fade in content after loading
      setTimeout(() => setShowContent(true), 100);
    }, 1500);

    return () => clearTimeout(loadTimer);
  }, []);

  // Handle navigation clicks with loading
  const handleNavClick = (e, targetId) => {
    e.preventDefault();
    setIsLoading(true);
    
    setTimeout(() => {
      setIsLoading(false);
      const element = document.getElementById(targetId);
      if (element) {
        element.scrollIntoView({ behavior: 'smooth' });
      }
    }, 800);
  };

  return (
    <div className="min-h-screen bg-athen-black">
      <LoadingBar isLoading={isLoading} />
      
      <div style={{ 
        opacity: showContent ? 1 : 0, 
        transition: 'opacity 0.5s ease-out',
        filter: isLoading ? 'blur(2px)' : 'blur(0)',
        transition: 'opacity 0.5s ease-out, filter 0.3s ease-out'
      }}>
        <Nav onNavClick={handleNavClick} />
        <Hero />
        <About />
        <Domains />
        <Team />
        <JoinCTA />
        <Footer />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
